<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Chat</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --pos: #22c55e; --neg: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 500px; background: var(--card); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; flex-direction: column; height: 80vh; }
        header { padding: 20px; border-bottom: 1px solid #334155; text-align: center; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; }
        .msg-bubble { margin-bottom: 15px; padding: 10px 15px; border-radius: 12px; line-height: 1.4; background: #334155; border-left: 5px solid #7f8c8d; }
        .positive { border-left: 5px solid var(--pos); background: rgba(34, 197, 94, 0.1); }
        .negative { border-left: 5px solid var(--neg); background: rgba(239, 68, 68, 0.1); }
        form { display: flex; padding: 20px; gap: 10px; border-top: 1px solid #334155; }
        input { flex-grow: 1; background: #334155; border: none; padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <header><h2>AI Sentiment Chat</h2></header>
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Type a message..." />
            <button>Send</button>
        </form>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messagesUl = document.getElementById('messages');

        // This helper function handles the UI rendering
        function displayMessage(data) {
            const item = document.createElement('li');
            item.classList.add('msg-bubble');
            item.textContent = data.text;

            if (data.score > 0) {
                item.classList.add('positive');
                item.textContent += ` (+${data.score})`;
            } else if (data.score < 0) {
                item.classList.add('negative');
                item.textContent += ` (${data.score})`;
            }
            
            messagesUl.appendChild(item);
            messagesUl.scrollTop = messagesUl.scrollHeight;
        }

        socket.on('load_history', (history) => {
            history.forEach(data => displayMessage(data));
        });

        socket.on('chat_message', (data) => {
            displayMessage(data);
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat_message', input.value);
                input.value = '';
            }
        });
    </script>
</body>
</html>
